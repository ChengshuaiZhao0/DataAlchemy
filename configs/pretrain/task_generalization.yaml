# Task-generalization example.
#
# Trains on three compositions ([F1][F1], [F1][F2], [F2][F2]) and evaluates
# on the held-out composition [F2][F1] — the CMP scenario. Every component
# rule has been seen during training; only the ordering is new.

_base: ../_base/pretrain.yaml

dataset:
  train: data/F1F1.jsonl,data/F1F2.jsonl,data/F2F1.jsonl
  test:
    - data/F2F2.jsonl

system:
  experiment: task_generalization

checkpoint:
  tokenizer_dir: ./saves/task_generalization/tokenizer
  model_dir: ./saves/task_generalization/model
  log_dir: ./logs/task_generalization
  result_dir: ./results/task_generalization
